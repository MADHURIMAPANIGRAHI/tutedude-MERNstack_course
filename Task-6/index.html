<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hello Again!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="page-wrapper">
        <main class="login-container">
            
            <section class="left-section">
                <img src="https://cdn-icons-png.flaticon.com/512/18653/18653634.png" alt="Laundry Illustration" class="illustration">
            </section>
            
            <section class="form-section">
                <div class="form-wrapper">
                    
                    <div class="form-header">
                        <h2>Hello Again!</h2>
                        <p>Welcome back! we missed you!</p>
                    </div>

                    <form action="#" class="login-form" onsubmit="return false;">
                        <div class="input-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="EmailId@site.com" required>
                        </div>

                        <div class="input-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" placeholder="Password" required>
                        </div>

                        <div class="form-actions">
                            <a href="#" class="forgot-link">Forgot Password</a>
                        </div>

                        <button type="submit" class="login-btn">Login</button>
                    </form>

                    <div class="form-footer">
                        <p>Not a member? <a href="#" class="register-link">Register Now</a></p>
                    </div>

                </div>
            </section>

        </main>
    </div>

</body>
</html>
